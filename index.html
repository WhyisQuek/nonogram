<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Nonogram</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & base ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f0f;
      --surface:   #1a1a1a;
      --border:    #6b6560;
      --border-hi: #8c857c;
      --filled:    #e8e0d0;
      --marked:    #3a3a3a;
      --accent:    #c8a96e;
      --accent2:   #7eb8c8;
      --text:      #c8c0b0;
      --text-dim:  #666;
      --clue-bg:   #141414;
      --win-glow:  #c8a96e;

      /* Natural (unscaled) sizes — JS will apply a scale transform */
      --cell:    28px;
      --clue-w:  56px;    /* fits up to 2 numbers across a row clue */
      --clue-h:  56px;    /* fits up to 2 numbers stacked in a column clue */
      --gap:     1px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      overflow-x: hidden;
    }

    /* ── Layout ─────────────────────────────────────────────── */
    #app {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0 40px;
    }

    header {
      text-align: center;
      margin-bottom: 16px;
      padding: 0 16px;
    }

    header h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      letter-spacing: -0.02em;
      color: var(--filled);
      line-height: 1;
    }

    header p {
      margin-top: 4px;
      font-size: 0.72rem;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* ── Toolbar ─────────────────────────────────────────────── */
    #toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 0 16px;
    }

    .btn {
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 9px 18px;
      border-radius: 2px;
      border: 1px solid var(--border-hi);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .btn:active { background: var(--border-hi); }

    .btn-mode {
      border-color: var(--border);
      color: var(--text-dim);
    }
    .btn-mode.active {
      border-color: var(--accent);
      color: var(--accent);
      background: #1f1a10;
    }
    .btn-mark.active {
      border-color: var(--accent2);
      color: var(--accent2);
      background: #101820;
    }

    /* ── Puzzle scale wrapper ────────────────────────────────── */
    /*
     * #puzzle-sizer is a fixed-size "viewport" (clips overflow) sized to
     * the fit dimensions. #puzzle-scale is transformed inside it with
     * scale + translate: single-finger draws, two-finger pinch zooms and
     * pans. Clipping keeps the legend below from shifting when zoomed.
     */
    #puzzle-sizer {
      margin: 0 auto;
      overflow: hidden;
      position: relative;
      touch-action: none;
      /* width & height set by JS to natural size × fitScale */
    }

    #puzzle-scale {
      transform-origin: top left;
      /* transform + width set by JS */
    }

    /* ── Puzzle grid ─────────────────────────────────────────── */
    #puzzle {
      display: inline-grid;
      /* grid-template set dynamically by JS from the nonogram region size */
      gap: var(--gap);
      background: var(--bg);
      border: 1px solid var(--border);
      user-select: none;
      -webkit-user-select: none;
      /* touch-action none: we handle all touch ourselves */
      touch-action: none;
    }

    /* ── Corner ──────────────────────────────────────────────── */
    .corner {
      background: var(--bg);
      grid-column: 1;
      grid-row: 1;
    }

    /* ── Clue cells ──────────────────────────────────────────── */
    .col-clue {
      background: var(--clue-bg);
      grid-row: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 4px 2px;
      gap: 5px;
      border-bottom: 2px solid var(--border-hi);
    }

    .row-clue {
      background: var(--clue-bg);
      grid-column: 1;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: flex-end;
      padding: 2px 6px;
      gap: 6px;
      border-right: 2px solid var(--border-hi);
    }

    .clue-num {
      font-size: 13px;
      color: var(--text);
      line-height: 1;
      min-width: 1ch;
      text-align: center;
      transition: color 0.12s, opacity 0.12s;
    }

    /* whole clue line dimmed once its row/column is fully satisfied */
    .clue-num.done {
      color: var(--text-dim);
      opacity: 0.4;
    }

    /* section borders every 5 cells */
    .col-clue.sec-start { border-left: 2px solid var(--border-hi); }
    .row-clue.sec-start { border-top: 2px solid var(--border-hi); }

    /* ── Grid cells ──────────────────────────────────────────── */
    .cell {
      background: var(--surface);
      border: 1px solid var(--border);
      cursor: pointer;
      position: relative;
      -webkit-tap-highlight-color: transparent;
    }

    .cell.filled {
      background: var(--filled);
      border-color: var(--filled);
    }

    /* X mark */
    .cell.marked { background: var(--marked); }
    .cell.marked::before,
    .cell.marked::after {
      content: '';
      position: absolute;
      inset: 18% 46%;
      background: #666;
      border-radius: 1px;
    }
    .cell.marked::before { transform: rotate(45deg); }
    .cell.marked::after  { transform: rotate(-45deg); }

    /* section grid lines */
    .cell.sec-col { border-left: 2px solid var(--border-hi); }
    .cell.sec-row { border-top: 2px solid var(--border-hi); }

    /* given / pre-filled clue cells */
    .cell.given {
      background: #c8a96e;
      border-color: #c8a96e;
      cursor: default;
    }

    /* ── QR view ─────────────────────────────────────────────── */
    #qr-view {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 0 16px;
      width: 100%;
    }
    body.qr-mode #qr-view { display: flex; }
    body.qr-mode #puzzle-sizer,
    body.qr-mode #legend,
    body.qr-mode .draw-only { display: none; }

    #qr-canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border-radius: 6px;
      max-width: 100%;
      height: auto;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    #qr-status {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-align: center;
      min-height: 1.2em;
    }
    #qr-status.complete { color: var(--accent); }
    #qr-status.incomplete { color: var(--text-dim); }

    /* active btn state for the QR toggle */
    #btn-check-qr.active {
      border-color: var(--accent);
      color: var(--accent);
      background: #1f1a10;
    }

    /* ── Win overlay ─────────────────────────────────────────── */
    #win-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    #win-overlay.show {
      display: flex;
      animation: fadeIn 0.4s ease;
    }
    #win-overlay h2 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 8vw, 3.5rem);
      font-weight: 800;
      color: var(--win-glow);
      text-shadow: 0 0 40px var(--win-glow);
      letter-spacing: -0.02em;
    }
    #win-overlay p {
      font-size: 0.8rem;
      color: var(--text);
      letter-spacing: 0.1em;
    }
    #win-hint {
      font-size: 0.78rem;
      color: var(--accent);
      letter-spacing: 0.08em;
    }
    #win-hint strong {
      color: var(--filled);
    }
    #win-overlay .btn { margin-top: 8px; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* ── Intro overlay ───────────────────────────────────────── */
    #intro-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #intro-overlay.show {
      display: flex;
      animation: fadeIn 0.4s ease;
    }
    #intro-box {
      background: var(--surface);
      border: 1px solid var(--border-hi);
      border-radius: 4px;
      padding: 32px 28px;
      max-width: 380px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
      text-align: center;
    }
    #intro-box h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--filled);
      letter-spacing: -0.02em;
    }
    #intro-box p {
      font-size: 0.82rem;
      color: var(--text);
      line-height: 1.7;
      letter-spacing: 0.04em;
    }
    #intro-box strong { color: var(--accent); }
    #btn-intro-ok { margin-top: 8px; align-self: center; padding: 10px 28px; }

    /* ── Legend ──────────────────────────────────────────────── */
    #legend {
      margin-top: 14px;
      display: flex;
      gap: 16px;
      font-size: 0.62rem;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      flex-wrap: wrap;
      justify-content: center;
      padding: 0 16px;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-swatch {
      width: 13px; height: 13px;
      border-radius: 2px;
      border: 1px solid var(--border-hi);
      flex-shrink: 0;
    }
    .swatch-filled { background: var(--filled); }
    .swatch-given  { background: #c8a96e; }
    .swatch-marked { background: var(--marked); position: relative; overflow: hidden; }
    .swatch-marked::before,
    .swatch-marked::after {
      content: '';
      position: absolute;
      inset: 20% 46%;
      background: #888;
      border-radius: 1px;
    }
    .swatch-marked::before { transform: rotate(45deg); }
    .swatch-marked::after  { transform: rotate(-45deg); }
    .swatch-empty  { background: var(--surface); }
  </style>
</head>
<body>
<div id="app">
  <header>
    <h1 id="title-el">Nonogram</h1>
    <p id="subtitle-el"></p>
  </header>

  <div id="toolbar">
    <button class="btn btn-mode active draw-only" id="btn-fill">■ Fill</button>
    <button class="btn btn-mode btn-mark draw-only" id="btn-mark">✕ Mark</button>
    <button class="btn draw-only" id="btn-clear-marks">✕ Clear</button>
    <button class="btn" id="btn-check-qr">▦ Check QR</button>
    <button class="btn draw-only" id="btn-fit">⤢ Fit</button>
    <button class="btn draw-only" id="btn-reset">↺ Reset</button>
  </div>

  <div id="puzzle-sizer">
    <div id="puzzle-scale">
      <div id="puzzle"></div>
    </div>
  </div>

  <div id="qr-view">
    <canvas id="qr-canvas"></canvas>
    <p id="qr-status"></p>
  </div>

  <div id="legend">
    <div class="legend-item"><div class="legend-swatch swatch-filled"></div>Filled</div>
    <div class="legend-item"><div class="legend-swatch swatch-given"></div>Given</div>
    <div class="legend-item"><div class="legend-swatch swatch-marked"></div>Marked</div>
    <div class="legend-item"><div class="legend-swatch swatch-empty"></div>Empty</div>
  </div>
</div>

<div id="win-overlay">
  <h2>Puzzle Complete!</h2>
  <p id="win-hint">Press <strong>▦ Check QR</strong> to complete the code.</p>
  <button class="btn" id="btn-win-ok">OK</button>
</div>

<div id="intro-overlay">
  <div id="intro-box">
    <h2>How to play</h2>
    <p>Solve the nonogram to complete the QR code.</p>
    <p>Once solved, press <strong>▦ Check QR</strong> and scan the completed code :D</p>
    <button class="btn" id="btn-intro-ok">Let's go</button>
  </div>
</div>

<script src="puzzle.js"></script>
<script>
// ── Constants ─────────────────────────────────────────────────
// The nonogram is the region of the QR defined in PUZZLE_CONFIG.nonogram
const NONO   = PUZZLE_CONFIG.nonogram;
const ROWS   = NONO.height;   // = PUZZLE_CONFIG.rows.length
const COLS   = NONO.width;    // = PUZZLE_CONFIG.cols.length
const CELL   = 28;   // natural cell size in px (matches --cell CSS var)
const GAP    = 1;
const CLUE_W = 56;   // natural clue area width  (matches --clue-w)
const CLUE_H = 56;   // natural clue area height (matches --clue-h)

// Natural pixel dimensions of the nonogram (with clue strips)
function naturalW() { return CLUE_W + COLS * CELL + (COLS + 1) * GAP; }
function naturalH() { return CLUE_H + ROWS * CELL + (ROWS + 1) * GAP; }

// Apply the CSS grid-template to the puzzle element
function applyGridTemplate() {
  puzzleEl.style.gridTemplateColumns = `var(--clue-w) repeat(${COLS}, var(--cell))`;
  puzzleEl.style.gridTemplateRows    = `var(--clue-h) repeat(${ROWS}, var(--cell))`;
}

// ── Scale / zoom / pan ────────────────────────────────────────
const scaleEl = document.getElementById('puzzle-scale');
const sizerEl = document.getElementById('puzzle-sizer');

let fitScale    = 1;     // base scale that fits the puzzle to viewport width
let userZoom    = 1;     // pinch zoom multiplier (1 = fit, >1 = zoomed in)
let panX        = 0;     // translation in screen px (<= 0 when zoomed)
let panY        = 0;
let currentScale = 1;    // effective scale = fitScale * userZoom (used for hit-testing)

const MAX_ZOOM = 4;

// Viewport (clip box) dimensions in screen px
function viewportW() { return naturalW() * fitScale; }
function viewportH() { return naturalH() * fitScale; }

// Keep pan within bounds so the puzzle can't be dragged off-screen
function clampPan() {
  const scaledW = naturalW() * currentScale;
  const scaledH = naturalH() * currentScale;
  const minX = Math.min(0, viewportW() - scaledW);
  const minY = Math.min(0, viewportH() - scaledH);
  panX = Math.min(0, Math.max(minX, panX));
  panY = Math.min(0, Math.max(minY, panY));
}

function applyTransform() {
  currentScale = fitScale * userZoom;
  clampPan();
  scaleEl.style.transform =
    `translate(${panX}px, ${panY}px) scale(${currentScale})`;
}

// Recompute the fit scale (on load and on resize/orientation change)
function applyScale() {
  const sideMargin = 8;
  const availW = window.innerWidth - sideMargin * 2;
  fitScale = Math.min(1, availW / naturalW());

  scaleEl.style.width = naturalW() + 'px';

  // The clip viewport is the fit-size box
  sizerEl.style.width  = Math.round(viewportW()) + 'px';
  sizerEl.style.height = Math.round(viewportH()) + 'px';

  applyTransform();
}

window.addEventListener('resize', applyScale);

// ── Helpers ──────────────────────────────────────────────────
// Build a fast lookup set for given cells: "r,c"
const GIVENS = new Set((PUZZLE_CONFIG.givens || []).map(([r, c]) => `${r},${c}`));
function isGiven(r, c) { return GIVENS.has(`${r},${c}`); }

function getRunsFromRow(cells) {
  const runs = [];
  let count = 0;
  for (const v of cells) {
    if (v) { count++; }
    else if (count) { runs.push(count); count = 0; }
  }
  if (count) runs.push(count);
  return runs.length ? runs : [0];
}

function runsMatch(a, b) {
  if (a.length !== b.length) return false;
  return a.every((v, i) => v === b[i]);
}

// ── State ─────────────────────────────────────────────────────
// 0 = empty, 1 = filled, 2 = marked(X)
const grid = Array.from({ length: ROWS }, () => new Uint8Array(COLS));

const STORAGE_KEY = `nonogram-${PUZZLE_CONFIG.title}-${PUZZLE_CONFIG.subtitle}`;

function saveState() {
  const flat = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      flat.push(grid[r][c]);
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(flat)); } catch {}
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const flat = JSON.parse(raw);
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        grid[r][c] = flat[r * COLS + c] || 0;
  } catch {}
}

// ── Build DOM ─────────────────────────────────────────────────
const puzzleEl = document.getElementById('puzzle');
const cellEls  = Array.from({ length: ROWS }, () => new Array(COLS));
const rowClueEls = new Array(ROWS);
const colClueEls = new Array(COLS);

function buildGrid() {
  puzzleEl.innerHTML = '';

  // Corner (explicit position: track 1,1)
  const corner = document.createElement('div');
  corner.className = 'corner';
  corner.style.gridColumn = '1';
  corner.style.gridRow = '1';
  puzzleEl.appendChild(corner);

  // Column clues (row 1, columns 2..COLS+1)
  for (let c = 0; c < COLS; c++) {
    const div = document.createElement('div');
    div.className = 'col-clue' + (c % 5 === 0 ? ' sec-start' : '');
    div.style.gridColumn = (c + 2).toString();
    div.style.gridRow = '1';
    PUZZLE_CONFIG.cols[c].forEach(n => {
      const span = document.createElement('span');
      span.className = 'clue-num';
      span.textContent = n;
      div.appendChild(span);
    });
    colClueEls[c] = div;
    puzzleEl.appendChild(div);
  }

  // Row clues + cells
  for (let r = 0; r < ROWS; r++) {
    // row clue (column 1, rows 2..ROWS+1)
    const rDiv = document.createElement('div');
    rDiv.className = 'row-clue' + (r % 5 === 0 ? ' sec-start' : '');
    rDiv.style.gridColumn = '1';
    rDiv.style.gridRow = (r + 2).toString();
    PUZZLE_CONFIG.rows[r].forEach(n => {
      const span = document.createElement('span');
      span.className = 'clue-num';
      span.textContent = n;
      rDiv.appendChild(span);
    });
    rowClueEls[r] = rDiv;
    puzzleEl.appendChild(rDiv);

    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell'
        + (c % 5 === 0 ? ' sec-col' : '')
        + (r % 5 === 0 ? ' sec-row' : '');
      // explicit position pins the cell regardless of clue visibility
      cell.style.gridColumn = (c + 2).toString();
      cell.style.gridRow = (r + 2).toString();
      cellEls[r][c] = cell;
      puzzleEl.appendChild(cell);
    }
  }

  applyGridTemplate();
}

// ── Render ─────────────────────────────────────────────────────
function renderCell(r, c) {
  const el = cellEls[r][c];
  if (isGiven(r, c)) {
    el.classList.add('given');
    el.classList.remove('filled', 'marked');
    return;
  }
  const v = grid[r][c];
  el.classList.toggle('filled', v === 1);
  el.classList.toggle('marked', v === 2);
}

function renderAll() {
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      renderCell(r, c);
  updateClueHighlights();
}

// Grey out a whole clue line (all its numbers) once that row/column's runs
// exactly match the clue — i.e. the line is completely satisfied.
function applyClueDone(clueEl, done) {
  const spans = clueEl.children;
  for (let i = 0; i < spans.length; i++)
    spans[i].classList.toggle('done', done);
}

function updateClueHighlights() {
  for (let r = 0; r < ROWS; r++) {
    const row = Array.from({ length: COLS }, (_, c) => (grid[r][c] === 1 || isGiven(r, c)) ? 1 : 0);
    applyClueDone(rowClueEls[r], runsMatch(getRunsFromRow(row), PUZZLE_CONFIG.rows[r]));
  }
  for (let c = 0; c < COLS; c++) {
    const col = Array.from({ length: ROWS }, (_, r) => (grid[r][c] === 1 || isGiven(r, c)) ? 1 : 0);
    applyClueDone(colClueEls[c], runsMatch(getRunsFromRow(col), PUZZLE_CONFIG.cols[c]));
  }
}

function checkWin() {
  for (let r = 0; r < ROWS; r++) {
    const row = Array.from({ length: COLS }, (_, c) => (grid[r][c] === 1 || isGiven(r, c)) ? 1 : 0);
    if (!runsMatch(getRunsFromRow(row), PUZZLE_CONFIG.rows[r])) return false;
  }
  for (let c = 0; c < COLS; c++) {
    const col = Array.from({ length: ROWS }, (_, r) => (grid[r][c] === 1 || isGiven(r, c)) ? 1 : 0);
    if (!runsMatch(getRunsFromRow(col), PUZZLE_CONFIG.cols[c])) return false;
  }
  return true;
}

// ── Hit-testing ───────────────────────────────────────────────
/*
 * We convert a client-space coordinate (from mouse or touch) into a
 * grid [row, col] by:
 *   1. Getting the puzzle element's bounding rect (already scaled by CSS).
 *   2. Computing position relative to the top-left of the grid.
 *   3. Skipping the clue area.
 *   4. Dividing by (CELL + GAP) * scale to get the cell index.
 *
 * Because getBoundingClientRect() returns *screen* pixels (post-scale),
 * we must account for currentScale when converting to natural-px units.
 */
function cellFromClient(clientX, clientY) {
  const rect  = puzzleEl.getBoundingClientRect();
  const scale = currentScale;

  // Position relative to puzzle top-left, in natural px
  const x = (clientX - rect.left)  / scale;
  const y = (clientY - rect.top)   / scale;

  // Subtract the clue strip (+ 1px border + gap)
  const clueOffX = CLUE_W + GAP;
  const clueOffY = CLUE_H + GAP;
  const cellStep = CELL + GAP;

  const xCell = x - clueOffX;
  const yCell = y - clueOffY;

  if (xCell < 0 || yCell < 0) return null;

  const col = Math.floor(xCell / cellStep);
  const row = Math.floor(yCell / cellStep);

  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return null;
  return { r: row, c: col };
}

// ── Input mode ────────────────────────────────────────────────
let mode = 'fill';
const btnFill = document.getElementById('btn-fill');
const btnMark = document.getElementById('btn-mark');

btnFill.addEventListener('click', () => setMode('fill'));
btnMark.addEventListener('click', () => setMode('mark'));

function setMode(m) {
  mode = m;
  btnFill.classList.toggle('active', m === 'fill');
  btnMark.classList.toggle('active', m === 'mark');
}

// ── Drag state ────────────────────────────────────────────────
let dragAction   = null;  // 'set' | 'clear'
let dragValue    = null;  // 1 | 2
let lastDragKey  = null;
let strokeStart  = 0;            // timestamp the current stroke began
let strokeChanges = [];          // {r,c,prev} for undo-on-pinch
const strokeKeys = new Set();    // cells already recorded this stroke

function startDrag(r, c) {
  strokeStart   = Date.now();
  strokeChanges = [];
  strokeKeys.clear();
  if (isGiven(r, c)) { dragAction = 'skip'; return; }
  const cur    = grid[r][c];
  const target = mode === 'fill' ? 1 : 2;
  dragAction   = (cur === target) ? 'clear' : 'set';
  dragValue    = target;
  lastDragKey  = null;
  commitCell(r, c);
}

function commitCell(r, c) {
  if (dragAction === 'skip' || dragAction === null) return;
  if (isGiven(r, c)) return;
  const key = `${r},${c}`;
  if (key === lastDragKey) return;
  lastDragKey = key;
  if (!strokeKeys.has(key)) {
    strokeKeys.add(key);
    strokeChanges.push({ r, c, prev: grid[r][c] });
  }
  grid[r][c] = dragAction === 'clear' ? 0 : dragValue;
  renderCell(r, c);
  updateClueHighlights();
}

// Undo the current stroke (used when a 2nd finger turns it into a pinch)
function revertStroke() {
  for (const { r, c, prev } of strokeChanges) {
    grid[r][c] = prev;
    renderCell(r, c);
  }
  updateClueHighlights();
  strokeChanges = [];
  strokeKeys.clear();
  dragAction = null;
}

function endDrag() {
  if (dragAction === null) return;
  dragAction = null;
  strokeChanges = [];
  strokeKeys.clear();
  saveState();
  if (checkWin()) showWin();
}

// ── Mouse events ──────────────────────────────────────────────
puzzleEl.addEventListener('mousedown', e => {
  const pos = cellFromClient(e.clientX, e.clientY);
  if (!pos) return;
  e.preventDefault();
  startDrag(pos.r, pos.c);
  saveState();
  if (checkWin()) showWin();
});

document.addEventListener('mousemove', e => {
  if (!dragAction) return;
  const pos = cellFromClient(e.clientX, e.clientY);
  if (pos) commitCell(pos.r, pos.c);
});

document.addEventListener('mouseup', endDrag);

// ── Touch events ──────────────────────────────────────────────
/*
 * One finger  → draw / erase cells (with the existing drag logic).
 * Two fingers → pinch to zoom and drag to pan, like a map.
 *
 * When a second finger lands, any draw that just started is reverted
 * (if it began within 300ms) so the pinch doesn't leave stray marks.
 */
let pinching   = false;
let pinchStartDist = 0;
let pinchStartZoom = 1;
let pinchStartPan  = { x: 0, y: 0 };
let pinchStartMid  = { x: 0, y: 0 };   // relative to sizer top-left

function touchDist(t1, t2) {
  const dx = t1.clientX - t2.clientX;
  const dy = t1.clientY - t2.clientY;
  return Math.hypot(dx, dy);
}

function touchMid(t1, t2) {
  const rect = sizerEl.getBoundingClientRect();
  return {
    x: (t1.clientX + t2.clientX) / 2 - rect.left,
    y: (t1.clientY + t2.clientY) / 2 - rect.top,
  };
}

function beginPinch(e) {
  // If a draw stroke just began, undo it — this was meant as a pinch
  if (dragAction !== null) {
    if (Date.now() - strokeStart < 300) revertStroke();
    else endDrag();
  }
  pinching       = true;
  pinchStartDist = touchDist(e.touches[0], e.touches[1]);
  pinchStartZoom = userZoom;
  pinchStartPan  = { x: panX, y: panY };
  pinchStartMid  = touchMid(e.touches[0], e.touches[1]);
}

puzzleEl.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length >= 2) {
    beginPinch(e);
    return;
  }
  // single finger → draw
  const t   = e.changedTouches[0];
  const pos = cellFromClient(t.clientX, t.clientY);
  if (!pos) return;
  startDrag(pos.r, pos.c);
  saveState();
  if (checkWin()) showWin();
}, { passive: false });

puzzleEl.addEventListener('touchmove', e => {
  e.preventDefault();

  // A second finger arrived mid-stroke → switch to pinch
  if (!pinching && e.touches.length >= 2) {
    beginPinch(e);
    return;
  }

  if (pinching && e.touches.length >= 2) {
    const dist = touchDist(e.touches[0], e.touches[1]);
    const mid  = touchMid(e.touches[0], e.touches[1]);

    // New zoom from the pinch ratio
    const factor  = dist / pinchStartDist;
    userZoom = Math.min(MAX_ZOOM, Math.max(1, pinchStartZoom * factor));

    // Keep the content point under the original midpoint fixed,
    // while also following the midpoint as it moves (= pan).
    const sStart = fitScale * pinchStartZoom;
    const sNow   = fitScale * userZoom;
    const contentX = (pinchStartMid.x - pinchStartPan.x) / sStart;
    const contentY = (pinchStartMid.y - pinchStartPan.y) / sStart;
    panX = mid.x - contentX * sNow;
    panY = mid.y - contentY * sNow;

    applyTransform();
    return;
  }

  // single finger → draw
  if (!dragAction) return;
  const t   = e.changedTouches[0];
  const pos = cellFromClient(t.clientX, t.clientY);
  if (pos) commitCell(pos.r, pos.c);
}, { passive: false });

function onTouchEnd(e) {
  // End pinch only when fewer than 2 fingers remain
  if (pinching && (!e.touches || e.touches.length < 2)) {
    pinching = false;
    // If one finger is still down, don't start a new draw from it —
    // wait for a fresh touchstart.
  }
  endDrag();
}

document.addEventListener('touchend',    onTouchEnd);
document.addEventListener('touchcancel', onTouchEnd);

// ── Reset ─────────────────────────────────────────────────────
function resetPuzzle() {
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (!isGiven(r, c)) grid[r][c] = 0;
  renderAll();
  try { localStorage.removeItem(STORAGE_KEY); } catch {}
}

document.getElementById('btn-reset').addEventListener('click', () => {
  if (confirm('Reset the puzzle?')) resetPuzzle();
});

// Clear all ✕ marks without touching filled cells
document.getElementById('btn-clear-marks').addEventListener('click', () => {
  let hadAny = false;
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (grid[r][c] === 2) { grid[r][c] = 0; hadAny = true; }
  if (hadAny) { renderAll(); saveState(); }
});

// Reset zoom & pan back to the fitted view
document.getElementById('btn-fit').addEventListener('click', () => {
  userZoom = 1;
  panX = 0;
  panY = 0;
  applyTransform();
});

// ── QR view ───────────────────────────────────────────────────
const btnCheckQR = document.getElementById('btn-check-qr');
const qrCanvas   = document.getElementById('qr-canvas');
const qrStatus   = document.getElementById('qr-status');
let qrMode = false;

// Is the cell at nonogram (r,c) "dark" (filled or given)?
function nonoDark(r, c) {
  return (grid[r][c] === 1 || isGiven(r, c)) ? 1 : 0;
}

// Is the nonogram solved? The QR region is blanked in puzzle.js (anti-cheat),
// so completion is judged by the clues being satisfied — i.e. checkWin().
function qrComplete() {
  return checkWin();
}

// Render the full QR code: fixed modules from config, region from player fill
function renderQR() {
  const qrSize = PUZZLE_CONFIG.qr.size;
  const matrix = PUZZLE_CONFIG.qr.matrix;
  const quiet  = 4;                       // standard quiet-zone width (modules)
  const total  = qrSize + quiet * 2;

  // Pick a crisp integer module size that fits the viewport
  const maxPx = Math.min(window.innerWidth - 32, 520);
  const modPx = Math.max(2, Math.floor(maxPx / total));
  const sizePx = modPx * total;

  qrCanvas.width  = sizePx;
  qrCanvas.height = sizePx;
  const ctx = qrCanvas.getContext('2d');

  // White background incl. quiet zone (needed for scanning)
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, sizePx, sizePx);

  ctx.fillStyle = '#000000';
  for (let r = 0; r < qrSize; r++) {
    for (let c = 0; c < qrSize; c++) {
      let dark;
      const inRegion = r >= NONO.y && r < NONO.y + ROWS &&
                       c >= NONO.x && c < NONO.x + COLS;
      if (inRegion) {
        dark = nonoDark(r - NONO.y, c - NONO.x) === 1;
      } else {
        dark = matrix[r][c] === 1;
      }
      if (dark) {
        ctx.fillRect((quiet + c) * modPx, (quiet + r) * modPx, modPx, modPx);
      }
    }
  }

  // Status line
  if (qrComplete()) {
    qrStatus.textContent = '✓ Code complete — scan it!';
    qrStatus.className = 'complete';
  } else {
    qrStatus.textContent = 'Region incomplete — keep solving';
    qrStatus.className = 'incomplete';
  }
}

function enterQRMode() {
  qrMode = true;
  document.body.classList.add('qr-mode');
  btnCheckQR.classList.add('active');
  btnCheckQR.textContent = '← Back';
  renderQR();
}

function exitQRMode() {
  qrMode = false;
  document.body.classList.remove('qr-mode');
  btnCheckQR.classList.remove('active');
  btnCheckQR.textContent = '▦ Check QR';
  applyScale();
}

btnCheckQR.addEventListener('click', () => {
  qrMode ? exitQRMode() : enterQRMode();
});

window.addEventListener('resize', () => { if (qrMode) renderQR(); });

// ── Win ───────────────────────────────────────────────────────
function showWin() {
  // Auto-clear all marks so the completed image is clean
  let changed = false;
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (grid[r][c] === 2) { grid[r][c] = 0; changed = true; }
  if (changed) { renderAll(); saveState(); }
  document.getElementById('win-overlay').classList.add('show');
}

function dismissWin() {
  document.getElementById('win-overlay').classList.remove('show');
}

document.getElementById('btn-win-ok').addEventListener('click', dismissWin);
document.getElementById('win-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('win-overlay')) dismissWin();
});

// ── Init ──────────────────────────────────────────────────────
document.getElementById('title-el').textContent    = PUZZLE_CONFIG.title;
document.getElementById('subtitle-el').textContent = PUZZLE_CONFIG.subtitle;
document.title = PUZZLE_CONFIG.title;

buildGrid();
applyScale();   // scale before loading state so layout is correct
loadState();
renderAll();

// ── Intro popup (first visit only) ────────────────────────────
const INTRO_KEY = `nonogram-intro-seen-${PUZZLE_CONFIG.title}`;
const introOverlay = document.getElementById('intro-overlay');
const btnIntroOk   = document.getElementById('btn-intro-ok');

function dismissIntro() {
  introOverlay.classList.remove('show');
  try { localStorage.setItem(INTRO_KEY, '1'); } catch {}
}

btnIntroOk.addEventListener('click', dismissIntro);
introOverlay.addEventListener('click', e => {
  if (e.target === introOverlay) dismissIntro();
});

try {
  if (!localStorage.getItem(INTRO_KEY)) introOverlay.classList.add('show');
} catch {
  introOverlay.classList.add('show');
}
</script>
</body>
</html>
